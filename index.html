<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Portfolio Configurator</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- WICG HTML-in-Canvas: Proxy canvas for CRT screen texture.
         The <div id="os-ui"> MUST be a direct child of this canvas.
         Ref: repalash/three-html-render — captureElementImage requires
         element.parentNode === canvas[layoutsubtree]. -->
    <canvas id="proxy-canvas" width="1024" height="768" layoutsubtree>
      <div id="os-ui"></div>
    </canvas>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
